<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Meteora DLMM LP Leaderboard</title>
    <style>
      :root {
        --bg-0: #0a0c0b;
        --bg-1: #0f1210;
        --bg-2: #161a17;
        --bg-3: #1e2320;
        --border: rgba(255,255,255,0.07);
        --border-hi: rgba(255,255,255,0.12);
        --green: #1cb87a;
        --green-dim: rgba(28,184,122,0.10);
        --red: #e05252;
        --red-dim: rgba(224,82,82,0.08);
        --amber: #c98500;
        --text-hi: #eef2ef;
        --text-mid: #9ba59d;
        --text-lo: #5a645c;
        --radius: 10px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg-0);
        color: var(--text-hi);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
        letter-spacing: 0;
      }
      button, input { font: inherit; }
      button {
        background: var(--bg-1);
        color: var(--text-hi);
        border: 1px solid var(--border-hi);
        border-radius: 8px;
        padding: 11px 16px;
        cursor: pointer;
      }
      button.active, button:hover { background: var(--bg-3); }
      input {
        width: 100%;
        background: #090d0b;
        color: var(--text-hi);
        border: 1px solid var(--border-hi);
        border-radius: 8px;
        padding: 13px 16px;
      }
      .shell { width: min(1366px, calc(100vw - 48px)); margin: 28px auto 64px; }
      .topbar { display: flex; justify-content: space-between; gap: 24px; align-items: flex-start; padding-bottom: 26px; border-bottom: 1px solid var(--border); }
      .eyebrow { color: #00ffc2; font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 4px; }
      h1 { margin: 6px 0 6px; font-size: 36px; line-height: 1.05; }
      p { color: var(--text-mid); margin: 0; font-size: 17px; }
      .status-badge { min-width: 210px; text-align: right; color: var(--text-mid); }
      .status-pill { display: inline-flex; align-items: center; gap: 8px; padding: 9px 12px; border: 1px solid var(--border); border-radius: 999px; background: var(--bg-1); }
      .status-pill.ok { color: var(--green); background: var(--green-dim); }
      .status-pill.warn { color: var(--amber); }
      .status-pill.err { color: var(--red); background: var(--red-dim); }
      .controls { display: flex; gap: 12px; flex-wrap: wrap; margin: 28px 0 22px; }
      .segmented { display: inline-flex; border: 1px solid var(--border-hi); border-radius: 8px; overflow: hidden; }
      .segmented button { border: 0; border-right: 1px solid var(--border-hi); border-radius: 0; min-width: 92px; }
      .segmented button:last-child { border-right: 0; }
      .pool-row, .lookup { display: grid; grid-template-columns: 1fr auto; gap: 12px; margin-bottom: 28px; }
      .tabs { display: flex; margin-bottom: 20px; }
      .tabs button { border-radius: 0; min-width: 150px; }
      .tabs button:first-child { border-radius: 8px 0 0 8px; }
      .tabs button:last-child { border-radius: 0 8px 8px 0; }
      .status { min-height: 25px; color: var(--text-mid); margin-bottom: 18px; }
      .status.error { color: var(--red); }
      .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
      .stats article, .panel, .result-card, .empty-state {
        background: var(--bg-1);
        border: 1px solid var(--border);
        border-radius: 8px;
      }
      .stats article { padding: 20px; }
      .stats span { display: block; color: var(--text-mid); font-size: 12px; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 14px; }
      .stats strong { font-size: 25px; }
      .positive { color: #00ffc2; }
      .negative { color: var(--red); }
      .view { display: none; }
      .view.active { display: block; }
      table { width: 100%; border-collapse: collapse; }
      th, td { padding: 16px 20px; border-bottom: 1px solid var(--border); text-align: right; }
      th { color: var(--text-mid); font-size: 12px; text-transform: uppercase; letter-spacing: 3px; }
      th:nth-child(1), th:nth-child(2), td:nth-child(1), td:nth-child(2) { text-align: left; }
      tr[data-wallet] { cursor: pointer; }
      tr[data-wallet]:hover { background: rgba(255,255,255,0.025); }
      .wallet strong { display: block; }
      .wallet small { display: block; color: var(--text-mid); margin-top: 6px; }
      .wallet-cell { display: inline-flex; align-items: center; gap: 8px; }
      .wallet-short { font-weight: 700; }
      .btn-copy {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--text-lo);
        padding: 2px 4px;
        border-radius: 4px;
        opacity: 0.6;
        transition: opacity .15s, color .15s, background .15s;
      }
      .wallet-cell:hover .btn-copy, .modal-pool-addr:hover .btn-copy { opacity: 1; }
      .btn-copy:hover { color: var(--text-mid); background: var(--bg-3); }
      .btn-copy.copied { color: var(--green); opacity: 1; }
      .rank { color: var(--amber); font-weight: 800; }
      .pos-pill { display: inline-flex; min-width: 34px; height: 34px; justify-content: center; align-items: center; background: var(--bg-3); border-radius: 8px; }
      .result-card, .empty-state { padding: 24px; color: var(--text-mid); }
      .pool-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 10px; padding: 12px; }
      .pool-card { padding: 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-2); cursor: pointer; }
      .pool-card:hover { border-color: var(--border-hi); background: var(--bg-3); }
      .pool-card strong { display: block; margin-bottom: 10px; }
      .pool-card span { display: block; color: var(--text-mid); font-size: 13px; margin-top: 4px; }
      .drawer { position: fixed; inset: 0; display: none; background: rgba(0,0,0,0.5); }
      .drawer.active { display: block; }
      .drawer-panel { margin-left: auto; width: min(920px, 100vw); min-height: 100vh; max-height: 100vh; overflow-y: auto; background: var(--bg-1); border-left: 1px solid var(--border-hi); padding: 24px; }
      .drawer-head { display: flex; justify-content: space-between; gap: 16px; align-items: start; margin-bottom: 24px; }
      .drawer-actions { display: flex; gap: 8px; margin-top: 8px; }
      .drawer-actions button, .drawer-actions a { display: inline-flex; align-items: center; gap: 6px; color: var(--text-mid); text-decoration: none; background: var(--bg-2); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 12px; }
      .breakdown { margin-top: 18px; display: grid; gap: 8px; }
      .breakdown-row { display: grid; grid-template-columns: 1fr auto; gap: 12px; padding: 12px; background: var(--bg-2); border-radius: 8px; }
      .modal-tabs { display: flex; gap: 18px; border-bottom: 1px solid var(--border); margin: 18px 0 10px; }
      .modal-tab { background: none; border: 0; border-bottom: 2px solid transparent; border-radius: 0; color: var(--text-lo); padding: 10px 0; }
      .modal-tab.on { color: var(--green); border-bottom-color: var(--green); }
      .modal-tab-badge { font-size: 10px; padding: 1px 6px; border-radius: 10px; background: var(--bg-3); color: var(--text-mid); }
      .modal-pool-row { padding: 12px 0; border-bottom: 1px solid var(--border); }
      .modal-pool-header { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 6px; }
      .modal-pool-name { font-weight: 700; }
      .modal-pool-status-open { color: var(--green); background: var(--green-dim); border-radius: 4px; padding: 2px 8px; font-size: 11px; }
      .modal-pool-status-closed { color: var(--text-lo); background: var(--bg-3); border-radius: 4px; padding: 2px 8px; font-size: 11px; }
      .modal-pool-addr { display: flex; align-items: center; gap: 8px; color: var(--text-lo); font-family: monospace; font-size: 12px; margin-bottom: 10px; }
      .modal-pool-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .modal-pool-stat-label { color: var(--text-lo); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
      .modal-pool-stat-val { margin-top: 3px; font-size: 13px; }
      .position-list { display: grid; gap: 8px; margin-top: 12px; }
      .position-row { border: 1px solid var(--border); border-radius: 8px; padding: 10px; background: rgba(255,255,255,0.02); }
      .position-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
      .position-address { display: inline-flex; align-items: center; gap: 6px; font-family: monospace; color: var(--text-mid); font-size: 12px; }
      .position-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px 10px; color: var(--text-mid); font-size: 12px; }
      .position-grid strong { color: var(--text-hi); font-weight: 600; }
      .wallet-pools-title { color: var(--text-mid); font-size: 14px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; margin: 4px 0 14px; }
      .wallet-pool-list { border: 1px solid var(--border-hi); border-radius: 8px; overflow: hidden; background: #090b0a; }
      .wallet-pool-card + .wallet-pool-card { border-top: 1px solid var(--border); }
      .wallet-pool-card summary { list-style: none; cursor: pointer; display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 16px; align-items: center; padding: 18px 20px; }
      .wallet-pool-card summary::-webkit-details-marker { display: none; }
      .wallet-pool-main { display: grid; gap: 8px; min-width: 0; }
      .wallet-pool-name-row { display: flex; align-items: center; gap: 10px; min-width: 0; }
      .wallet-pool-toggle { color: var(--text-mid); font-size: 11px; width: 14px; }
      .wallet-pool-name { font-weight: 800; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .wallet-pool-status { color: var(--text-hi); background: var(--bg-3); border-radius: 5px; padding: 3px 9px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
      .wallet-pool-status.open { color: var(--green); background: var(--green-dim); }
      .wallet-pool-meta { color: var(--text-mid); font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; }
      .wallet-pool-result { text-align: right; display: grid; gap: 4px; justify-items: end; }
      .wallet-pool-result strong { font-size: 18px; }
      .wallet-pool-result span { color: var(--text-mid); font-size: 13px; }
      .wallet-position-list { border-top: 1px solid var(--border); padding: 0 16px 14px; display: grid; gap: 10px; }
      .wallet-position-row { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 12px; padding: 14px 0 0; border-top: 1px solid rgba(255,255,255,0.04); }
      .wallet-position-row:first-child { border-top: 0; }
      .wallet-position-line { color: var(--text-mid); font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; margin-top: 4px; overflow-wrap: anywhere; }
      .wallet-position-label { color: var(--text-mid); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-top: 12px; }
      .wallet-position-pre { color: var(--text-hi); font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; white-space: pre-wrap; margin: 6px 0 0; line-height: 1.8; }
      .wallet-position-actions { display: flex; align-items: start; gap: 8px; justify-content: flex-end; }
      .wallet-position-actions a { color: var(--text-mid); text-decoration: none; border: 1px solid var(--border-hi); border-radius: 6px; padding: 7px 10px; font-size: 12px; }
      .spinner { width: 22px; height: 22px; border: 3px solid var(--border-hi); border-top-color: var(--green); border-radius: 50%; animation: spin 0.9s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @media (max-width: 760px) {
        .shell { width: min(100vw - 24px, 1366px); }
        .topbar, .pool-row, .lookup { grid-template-columns: 1fr; display: grid; }
        .status-badge { text-align: left; }
        .stats { grid-template-columns: 1fr 1fr; }
        th, td { padding: 12px 10px; }
        .wallet small { display: none; }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <div class="eyebrow">Meteora DLMM</div>
          <h1>LP Leaderboard</h1>
          <p>PnL computed from indexed on-chain position history across all indexed pools.</p>
        </div>
        <div class="status-badge">
          <span id="statusBadge" class="status-pill">Loading status...</span>
        </div>
      </section>

      <section class="controls">
        <div class="segmented">
          <button class="active" type="button" data-mode="winners">Top winners</button>
          <button type="button" data-mode="losers">Top losers</button>
        </div>
        <div class="segmented">
          <button type="button" data-period="1">1d</button>
          <button class="active" type="button" data-period="7">7d</button>
        </div>
        <button id="refreshButton" type="button">Refresh</button>
      </section>

      <section class="pool-row">
        <input id="poolInput" type="text" spellcheck="false" placeholder="Optional pool address filter. Leave empty for all indexed pools.">
        <button id="loadPoolButton" type="button">Filter</button>
      </section>

      <nav class="tabs">
        <button class="active" type="button" data-tab="leaderboard">Leaderboard</button>
        <button type="button" data-tab="wallet">Wallet Lookup</button>
        <button type="button" data-tab="pools">Pool Explorer</button>
      </nav>

      <section id="status" class="status"></section>

      <section class="stats">
        <article><span>Total PnL (shown)</span><strong id="totalPnl">$0</strong></article>
        <article><span>Avg PnL</span><strong id="avgPnl">$0</strong></article>
        <article><span>Total fees</span><strong id="feesEarned">$0</strong></article>
        <article><span>Indexed pools</span><strong id="poolCount">0</strong></article>
      </section>

      <section id="leaderboardView" class="panel view active">
        <table>
          <thead>
            <tr><th>#</th><th>Wallet</th><th>PnL SOL</th><th>PnL USD</th><th>Fees</th><th>Pool</th><th>Pos</th></tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        <div id="emptyState" class="empty-state" hidden></div>
      </section>

      <section id="walletView" class="panel view">
        <div class="lookup">
          <input id="walletInput" type="text" spellcheck="false" placeholder="Enter wallet address...">
          <button id="lookupButton" type="button">Look up</button>
        </div>
        <div id="walletResult" class="result-card"></div>
      </section>

      <section id="poolsView" class="panel view">
        <div id="poolGrid" class="pool-grid"></div>
      </section>
    </main>

    <section id="drawer" class="drawer">
      <aside class="drawer-panel">
        <div class="drawer-head">
          <div>
            <h2>Wallet Detail</h2>
            <p id="drawerWallet"></p>
            <div class="drawer-actions">
              <button id="drawerCopy" type="button">Copy</button>
              <a id="drawerSolscan" href="#" target="_blank" rel="noopener">Solscan</a>
            </div>
          </div>
          <button id="closeDrawer" type="button" onclick="window.closeWalletDrawer && window.closeWalletDrawer()">x</button>
        </div>
        <div id="drawerContent"></div>
      </aside>
    </section>

    <script>
      const state = {
        mode: 'winners',
        period: '7',
        activeTab: 'leaderboard',
        poolFilter: null,
        offset: 0,
        limit: 50,
        rankings: [],
        pools: [],
        status: null,
        isLoading: false,
        lastFinishedSeen: null,
      };

      const el = {
        statusBadge: document.getElementById('statusBadge'),
        status: document.getElementById('status'),
        poolInput: document.getElementById('poolInput'),
        refreshButton: document.getElementById('refreshButton'),
        loadPoolButton: document.getElementById('loadPoolButton'),
        tableBody: document.getElementById('tableBody'),
        emptyState: document.getElementById('emptyState'),
        totalPnl: document.getElementById('totalPnl'),
        avgPnl: document.getElementById('avgPnl'),
        feesEarned: document.getElementById('feesEarned'),
        poolCount: document.getElementById('poolCount'),
        walletInput: document.getElementById('walletInput'),
        lookupButton: document.getElementById('lookupButton'),
        walletResult: document.getElementById('walletResult'),
        poolGrid: document.getElementById('poolGrid'),
        drawer: document.getElementById('drawer'),
        drawerWallet: document.getElementById('drawerWallet'),
        drawerContent: document.getElementById('drawerContent'),
        closeDrawer: document.getElementById('closeDrawer'),
        drawerCopy: document.getElementById('drawerCopy'),
        drawerSolscan: document.getElementById('drawerSolscan'),
      };
      let modalWalletAddr = null;
      let modalData = null;
      const copyIcon = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
      const checkIcon = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';

      function formatUsd(n, digits = 0) {
        const value = Number(n) || 0;
        const sign = value > 0 ? '+' : value < 0 ? '-' : '';
        return `${sign}$${Math.abs(value).toLocaleString(undefined, { minimumFractionDigits: digits, maximumFractionDigits: digits })}`;
      }

      function formatSol(n) {
        const value = Number(n) || 0;
        const sign = value > 0 ? '+' : value < 0 ? '-' : '';
        return `${sign}${Math.abs(value).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })} SOL`;
      }

      function shortWallet(addr) {
        return addr && addr.length > 12 ? `${addr.slice(0, 6)}...${addr.slice(-4)}` : addr || '-';
      }

      function escHtml(str) {
        return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      function timeAgo(ts) {
        if (!ts) return 'never';
        const dateMs = ts instanceof Date ? ts.getTime() : new Date(ts).getTime();
        if (!Number.isFinite(dateMs)) return '-';
        const seconds = Math.max(1, Math.floor((Date.now() - dateMs) / 1000));
        if (seconds < 60) return `${seconds}s ago`;
        const minutes = Math.floor(seconds / 60);
        if (minutes < 60) return `${minutes}m ago`;
        const hours = Math.floor(minutes / 60);
        if (hours < 48) return `${hours}h ago`;
        return `${Math.floor(hours / 24)}d ago`;
      }

      function timeAgoSeconds(ts) {
        if (!ts) return '-';
        const numeric = Number(ts);
        if (Number.isFinite(numeric)) {
          const ms = numeric < 10_000_000_000 ? numeric * 1000 : numeric;
          return timeAgo(ms);
        }
        return timeAgo(ts);
      }

      function durationText(seconds) {
        const value = Number(seconds) || 0;
        if (value <= 0) return '-';
        const days = Math.floor(value / 86400);
        if (days > 0) return `${days}d`;
        const hours = Math.floor(value / 3600);
        if (hours > 0) return `${hours}h`;
        return `${Math.floor(value / 60)}m`;
      }

      function formatUtc(ts) {
        if (!ts) return '-';
        const date = new Date(ts);
        if (!Number.isFinite(date.getTime())) return '-';
        return date.toISOString().replace('T', ' ').slice(0, 16) + ' UTC';
      }

      function pnlPct(pnlUsd, baseUsd) {
        const pnl = Number(pnlUsd) || 0;
        const base = Math.abs(Number(baseUsd) || 0);
        if (base <= 0) return null;
        return `${pnl >= 0 ? '+' : ''}${((pnl / base) * 100).toFixed(2)}%`;
      }

      function poolDisplayName(pool) {
        return pool.poolName || shortWallet(pool.poolAddress);
      }

      async function api(path, params = {}) {
        const url = new URL(path, window.location.origin);
        Object.entries(params).forEach(([key, value]) => {
          if (value !== undefined && value !== null && value !== '') url.searchParams.set(key, value);
        });
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), 20_000);
        try {
          const response = await fetch(url, { signal: controller.signal });
          const json = await response.json();
          if (!response.ok) throw new Error(json.error || `HTTP ${response.status}`);
          return json;
        } catch (error) {
          if (error.name === 'AbortError') throw new Error(`Timeout loading ${path}`);
          throw error;
        } finally {
          clearTimeout(timer);
        }
      }

      function setStatus(message, isError = false) {
        el.status.textContent = message || '';
        el.status.classList.toggle('error', isError);
      }

      function renderStats(result) {
        const rows = result.rankings || [];
        const total = rows.reduce((sum, row) => sum + (row.pnlUsd || 0), 0);
        const fees = rows.reduce((sum, row) => sum + (row.feesEarnedUsd || 0), 0);
        const avg = rows.length ? total / rows.length : 0;
        el.totalPnl.textContent = formatUsd(total);
        el.avgPnl.textContent = formatUsd(avg);
        el.feesEarned.textContent = formatUsd(fees);
        el.poolCount.textContent = String(result.meta?.indexedPools || 0);
        el.totalPnl.className = total >= 0 ? 'positive' : 'negative';
        el.avgPnl.className = avg >= 0 ? 'positive' : 'negative';
      }

      function renderLeaderboard(result) {
        el.tableBody.innerHTML = '';
        const rows = result.rankings || [];
        for (const row of rows) {
          const pnlClass = row.pnlUsd >= 0 ? 'positive' : 'negative';
          const tr = document.createElement('tr');
          tr.dataset.wallet = row.wallet;
          const bestPool = row.bestPoolName || '-';
          const bestPoolTitle = row.bestPoolAddress || bestPool;
          tr.innerHTML = `
            <td class="rank">${String(row.rank).padStart(2, '0')}</td>
            <td>
              <div class="wallet">
                <div class="wallet-cell">
                  <span class="wallet-short" data-full="${row.wallet}">${shortWallet(row.wallet)}</span>
                  <button class="btn-copy" data-addr="${row.wallet}" title="Copy address" type="button">${copyIcon}</button>
                </div>
                <small>${row.wallet}</small>
              </div>
            </td>
            <td class="${pnlClass}">${formatSol(row.pnlSol)}</td>
            <td class="${pnlClass}">${formatUsd(row.pnlUsd, 2)}</td>
            <td>${formatUsd(row.feesEarnedUsd, 2).replace('+', '')}</td>
            <td title="${escHtml(bestPoolTitle)}">
              <div>${escHtml(bestPool)}</div>
              <small>${timeAgo(row.lastUpdated)}</small>
            </td>
            <td><span class="pos-pill">${row.positionCount || 0}</span></td>
          `;
          el.tableBody.appendChild(tr);
        }
        el.emptyState.hidden = rows.length > 0;
        if (rows.length === 0) {
          const running = state.status?.indexer?.isRunning;
          el.emptyState.innerHTML = running
            ? `<div class="spinner"></div><h3>Initial indexing in progress</h3><p>Fetching data from ${state.status.indexer.progress.poolsDone}/${state.status.indexer.progress.poolsTotal} pools...</p><p>This may take 10-30 minutes on first run.</p>`
            : '<h3>No data yet</h3><p>Trigger an index run to populate the leaderboard.</p>';
        }
      }

      async function fetchLeaderboard() {
        state.isLoading = true;
        setStatus('Loading leaderboard...');
        try {
          const result = await api('/api/leaderboard', {
            mode: state.mode,
            period: state.period,
            limit: state.limit,
            offset: state.offset,
            pool: state.poolFilter,
          });
          state.rankings = result.rankings;
          renderStats(result);
          renderLeaderboard(result);
          const fallback = result.meta?.usedStaleFallback ? ' Showing latest cached data while current period/index catches up.' : '';
          setStatus(`Showing ${result.rankings.length}/${result.total} wallets ${state.poolFilter ? 'for selected pool' : 'across all indexed pools'}.${fallback}`);
        } catch (error) {
          setStatus(error.message, true);
        } finally {
          state.isLoading = false;
        }
      }

      async function fetchStatus() {
        try {
          state.status = await api('/api/status');
          const status = state.status.indexer;
          el.poolCount.textContent = String(state.status.database.poolCount || 0);
          if (status.isRunning) {
            el.statusBadge.className = 'status-pill warn';
            el.statusBadge.textContent = `Indexing... ${status.progress.poolsDone}/${status.progress.poolsTotal} pools`;
            if (!state.isLoading && state.rankings.length === 0) fetchLeaderboard();
          } else if (status.lastError) {
            el.statusBadge.className = 'status-pill err';
            el.statusBadge.textContent = 'Last index failed';
          } else if (!status.lastFinished) {
            el.statusBadge.className = 'status-pill warn';
            el.statusBadge.textContent = state.status.database.walletCount > 0 ? 'Partial index data' : 'No completed index';
          } else {
            el.statusBadge.className = 'status-pill ok';
            el.statusBadge.textContent = `Updated ${timeAgo(status.lastFinished)}`;
            if (status.lastFinished && status.lastFinished !== state.lastFinishedSeen) {
              state.lastFinishedSeen = status.lastFinished;
              if (!state.isLoading) fetchLeaderboard();
            }
          }
        } catch (error) {
          el.statusBadge.className = 'status-pill err';
          el.statusBadge.textContent = error.message;
        }
      }

      async function lookupWallet(address) {
        const wallet = address || el.walletInput.value.trim();
        if (!wallet) {
          el.walletResult.textContent = 'Enter a wallet address.';
          return;
        }
        el.walletResult.textContent = 'Loading wallet...';
        try {
          const result = await api(`/api/wallet/${wallet}`);
          el.walletResult.innerHTML = walletHtml(result);
        } catch (error) {
          el.walletResult.textContent = error.message;
        }
      }

      function walletHtml(result) {
        const s = result.summary;
        const pnlClass = s.pnlUsd >= 0 ? 'positive' : 'negative';
        const breakdown = result.poolBreakdown.map((pool) => `
          <div class="breakdown-row">
            <span>${pool.poolName || shortWallet(pool.poolAddress)}</span>
            <strong class="${pool.pnlUsd >= 0 ? 'positive' : 'negative'}">${formatUsd(pool.pnlUsd, 2)}</strong>
          </div>
        `).join('');
        return `
          <strong>${shortWallet(result.wallet)}</strong>
          <p>${result.wallet}</p>
          <div class="breakdown">
            <div class="breakdown-row"><span>Total PnL</span><strong class="${pnlClass}">${formatUsd(s.pnlUsd, 2)}</strong></div>
            <div class="breakdown-row"><span>Total fees</span><strong>${formatUsd(s.feesEarnedUsd, 2).replace('+', '')}</strong></div>
            <div class="breakdown-row"><span>Deposited</span><strong>${formatUsd(s.depositedUsd, 2).replace('+', '')}</strong></div>
          </div>
          <h3>Pool Breakdown</h3>
          <div class="breakdown">${breakdown || '<p>No indexed pool breakdown.</p>'}</div>
        `;
      }

      function renderModalPools() {
        if (!modalData) return;
        const pools = modalData.pools || modalData.poolBreakdown || [];
        if (!pools.length) {
          el.drawerContent.innerHTML = '<div class="empty-state">No pool details found for this wallet.</div>';
          return;
        }
        el.drawerContent.innerHTML = `
          <div class="wallet-pools-title">Pools (${pools.length})</div>
          <div class="wallet-pool-list">
            ${pools.map((pool, index) => {
          const pnlClass = pool.pnlUsd > 0 ? 'positive' : pool.pnlUsd < 0 ? 'negative' : '';
          const shortAddr = shortWallet(pool.poolAddress);
          const positions = pool.positions || [...(pool.openPositions || []), ...(pool.closedPositions || [])];
          const status = pool.hasOpenPosition ? 'open' : 'closed';
          const positionRows = positions.map((position, posIndex) => {
            const posAddr = position.positionAddress || '';
            const posStatus = position.status || (position.closedAt ? 'closed' : 'open');
            const posPnlClass = (position.pnlUsd || 0) >= 0 ? 'positive' : 'negative';
            const baseUsd = position.depositedUsd || position.currentValueUsd || pool.depositedUsd || pool.withdrawnUsd;
            const pct = pnlPct(position.pnlUsd || pool.pnlUsd, baseUsd);
            const entryUsd = Number(position.depositedUsd || position.currentValueUsd || 0);
            const entryTime = formatUtc(position.createdAt);
            const entryText = entryUsd > 0 || entryTime !== '-'
              ? `${entryUsd > 0 ? formatUsd(entryUsd, 1).replace('+', '') : 'Amount not indexed'} at ${entryTime}`
              : 'Entry data not indexed yet';
            const setup = (position.setup || []).length
              ? position.setup.join('\n')
              : (position.binRange ? `BIN RANGE ${position.binRange}` : 'No bin setup data indexed yet.');
            const positionTitle = position.aggregateOnly ? 'Aggregate pool row' : shortWallet(posAddr);
            const actions = posAddr
              ? `
                  <button class="btn-copy" data-addr="${posAddr}" title="Copy position" type="button">${copyIcon}</button>
                  <a href="https://app.meteora.ag/dlmm/${posAddr}" target="_blank" rel="noopener">Meteora</a>
                  <a href="https://solscan.io/account/${posAddr}" target="_blank" rel="noopener">Solscan</a>
                `
              : '<span class="wallet-position-line">No position address</span>';
            return `
              <div class="wallet-position-row">
                <div>
                  <div class="wallet-pool-name-row">
                    <span class="wallet-pool-toggle">${posIndex === 0 ? '&rsaquo;' : ''}</span>
                    <span class="wallet-pool-name">${escHtml(poolDisplayName(pool))}</span>
                    ${position.aggregateOnly ? '<span class="wallet-pool-status">aggregate</span>' : ''}
                  </div>
                  <div class="wallet-position-line">
                    ${escHtml(positionTitle)} &middot; ${escHtml(posStatus)} &middot; ${formatUtc(position.createdAt)} &rarr; ${position.closedAt ? formatUtc(position.closedAt) : 'now'}
                  </div>
                  <div class="wallet-position-label">Entry</div>
                  <div class="wallet-position-pre">${escHtml(entryText)}</div>
                  <div class="wallet-position-label">Set up</div>
                  <div class="wallet-position-pre">${escHtml(setup)}</div>
                  <div class="wallet-position-label">Close: <span class="${posStatus === 'open' ? 'positive' : ''}">${posStatus === 'open' ? 'open' : formatUtc(position.closedAt)}</span></div>
                </div>
                <div class="wallet-position-actions">
                  ${actions}
                </div>
              </div>`;
          }).join('') || '<div class="wallet-position-row"><div class="wallet-position-line">No individual positions indexed for this pool yet.</div></div>';
          const pct = pnlPct(pool.pnlUsd, pool.depositedUsd || pool.withdrawnUsd);
          return `
            <details class="wallet-pool-card" ${index === 0 ? 'open' : ''}>
              <summary>
                <div class="wallet-pool-main">
                  <div class="wallet-pool-name-row">
                    <span class="wallet-pool-toggle">&or;</span>
                    <span class="wallet-pool-name">${escHtml(poolDisplayName(pool))}</span>
                    <span class="wallet-pool-status ${status}">${status}</span>
                  </div>
                  <div class="wallet-pool-meta">${shortAddr} &middot; ${pool.positionCount || positions.length || 0} position${(pool.positionCount || positions.length) === 1 ? '' : 's'} &middot; fees ${formatUsd(pool.feesEarnedUsd, 2).replace('+', '')}</div>
                </div>
                <div class="wallet-pool-result">
                  <strong class="${pnlClass}">${formatUsd(pool.pnlUsd, 2)}</strong>
                  <span>${pct || ''}</span>
                </div>
              </summary>
              <div class="wallet-position-list">${positionRows}</div>
            </details>`;
        }).join('')}
          </div>
        `;
      }

      async function fetchPools() {
        try {
          const result = await api('/api/pools', { limit: 100 });
          state.pools = result.pools;
          el.poolGrid.innerHTML = result.pools.map((pool) => `
            <div class="pool-card" data-pool="${pool.address}">
              <strong>${pool.name}</strong>
              <span>${shortWallet(pool.address)}</span>
              <span>TVL ${formatUsd(pool.tvlUsd).replace('+', '')} | Vol ${formatUsd(pool.volume24hUsd).replace('+', '')}</span>
              <span>Fee ${pool.feeRate || 0}% | Positions ${pool.positionCount || 0}</span>
            </div>
          `).join('') || '<div class="empty-state">No indexed pools yet.</div>';
        } catch (error) {
          el.poolGrid.innerHTML = `<div class="empty-state">${error.message}</div>`;
        }
      }

      async function openWalletModal(wallet) {
        modalWalletAddr = wallet;
        modalData = null;
        el.drawer.classList.add('active');
        el.drawerWallet.textContent = wallet;
        el.drawerSolscan.href = `https://solscan.io/account/${wallet}`;
        el.drawerContent.textContent = 'Loading wallet...';
        document.body.style.overflow = 'hidden';
        try {
          const result = await api(`/api/wallet/${wallet}`);
          modalData = result;
          renderModalPools();
        } catch (error) {
          el.drawerContent.textContent = error.message;
        }
      }

      function closeModal() {
        el.drawer.classList.remove('active');
        document.body.style.overflow = '';
        modalWalletAddr = null;
        modalData = null;
      }
      window.closeWalletDrawer = closeModal;

      function setMode(mode) {
        state.mode = mode;
        state.offset = 0;
        document.querySelectorAll('[data-mode]').forEach((button) => button.classList.toggle('active', button.dataset.mode === mode));
        fetchLeaderboard();
      }

      function setTab(tab) {
        state.activeTab = tab;
        document.querySelectorAll('[data-tab]').forEach((button) => button.classList.toggle('active', button.dataset.tab === tab));
        document.querySelectorAll('.view').forEach((view) => view.classList.remove('active'));
        document.getElementById(`${tab}View`).classList.add('active');
        if (tab === 'pools') fetchPools();
      }

      function copyAddr(btn) {
        const addr = btn.dataset.addr;
        const done = () => {
          btn.classList.add('copied');
          btn.innerHTML = checkIcon;
          setTimeout(() => {
            btn.classList.remove('copied');
            btn.innerHTML = copyIcon;
          }, 1800);
        };
        if (navigator.clipboard?.writeText) {
          navigator.clipboard.writeText(addr).then(done).catch(() => fallbackCopy(addr, done));
        } else {
          fallbackCopy(addr, done);
        }
      }

      function fallbackCopy(text, done) {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        done();
      }

      function copyModalAddr() {
        if (!modalWalletAddr) return;
        const button = el.drawerCopy;
        button.dataset.addr = modalWalletAddr;
        copyAddr(button);
      }

      document.getElementById('tableBody').addEventListener('click', (event) => {
        const copyButton = event.target.closest('.btn-copy');
        if (copyButton) {
          copyAddr(copyButton);
          return;
        }
        const row = event.target.closest('[data-wallet]');
        if (row) openWalletModal(row.dataset.wallet);
      });
      el.drawerContent.addEventListener('click', (event) => {
        const copyButton = event.target.closest('.btn-copy');
        if (copyButton) copyAddr(copyButton);
      });
      document.querySelectorAll('[data-mode]').forEach((button) => button.addEventListener('click', () => setMode(button.dataset.mode)));
      document.querySelectorAll('[data-tab]').forEach((button) => button.addEventListener('click', () => setTab(button.dataset.tab)));
      document.querySelectorAll('[data-period]').forEach((button) => {
        button.addEventListener('click', () => {
          state.period = button.dataset.period;
          state.offset = 0;
          document.querySelectorAll('[data-period]').forEach((item) => item.classList.toggle('active', item === button));
          fetchLeaderboard();
        });
      });
      el.refreshButton.addEventListener('click', () => fetchLeaderboard());
      el.loadPoolButton.addEventListener('click', () => {
        state.poolFilter = el.poolInput.value.trim() || null;
        state.offset = 0;
        fetchLeaderboard();
      });
      el.lookupButton.addEventListener('click', () => lookupWallet());
      el.walletInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') lookupWallet();
      });
      el.poolGrid.addEventListener('click', (event) => {
        const card = event.target.closest('[data-pool]');
        if (!card) return;
        state.poolFilter = card.dataset.pool;
        el.poolInput.value = state.poolFilter;
        setTab('leaderboard');
        fetchLeaderboard();
      });
      el.closeDrawer.addEventListener('click', (event) => {
        event.preventDefault();
        event.stopPropagation();
        closeModal();
      });
      document.addEventListener('click', (event) => {
        if (event.target.closest('#closeDrawer')) {
          event.preventDefault();
          closeModal();
        }
      }, true);
      el.drawerCopy.addEventListener('click', copyModalAddr);
      el.drawer.addEventListener('click', (event) => {
        if (event.target === el.drawer) closeModal();
      });
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') closeModal();
      });

      function boot() {
        fetchStatus();
        fetchLeaderboard();
      }

      setInterval(fetchStatus, 10_000);
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', boot, { once: true });
      } else {
        boot();
      }
    </script>
  </body>
</html>
